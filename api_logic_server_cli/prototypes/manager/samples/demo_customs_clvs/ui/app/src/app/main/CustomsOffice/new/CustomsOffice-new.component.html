<o-form #CustomsOfficeForm attr="CustomsOffice_form_insert" service="CustomsOffice" entity="CustomsOffice"
keys="id" fxLayout="column" show-header="yes" header-actions="I"
horizontal-scroll="yes"
after-insert-mode="new" class="standalone-form-container" >

<o-row attr="row1" layout-align="start stretch">
  <div fxLayout="row wrap" fxLayoutAlign="start start" fxFlex fxLayoutGap="14px">
    
        <o-text-input #name attr="name" label=" name" enabled="yes" required="yes" fxFlex="20%" class="form-field"></o-text-input>
      
        <o-list-picker 
        attr="customs_region_id"
        service="CustomsRegion" 
        entity="CustomsRegionType"
        fxFlex="30" 
        query-on-init="no" 
        query-on-bind="yes" 
        required="yes" 
        enabled="yes" 
        filter="yes"
        value-column="id" 
        value-column-type="INTEGER"  
        keys="id" 
        columns="id;customs_region_id;region_name" 
        title="customs_region_id"
        visible-columns="id;region_name" 
        separator=" - " width="680px" class="form-field">
</o-list-picker>
      
        <o-text-input #office_code attr="office_code" label="office_code" enabled="yes" required="yes" fxFlex="20%" class="form-field"></o-text-input>
      
        <o-text-input #province attr="province" label="province" enabled="yes" required="yes" fxFlex="20%" class="form-field"></o-text-input>
      
        <o-text-input #city attr="city" label="city" enabled="yes" required="yes" fxFlex="20%" class="form-field"></o-text-input>
      
        <o-text-input #Type attr="Type" label="Type" enabled="yes" required="yes" fxFlex="20%" class="form-field"></o-text-input>
      
        <o-integer-input #clvs_release attr="clvs_release" label="clvs_release" type="integer" editable="no" required="yes" ></o-integer-input>
      
        <o-integer-input #sufferance_warehouse attr="sufferance_warehouse" label="sufferance_warehouse" type="integer" editable="no" required="yes" ></o-integer-input>
      
        <o-integer-input #id attr="id" label="id" type="integer" editable="no" required="no" ></o-integer-input>
      
</div>
</o-row>

<div layout-padding></div>

</o-form>
