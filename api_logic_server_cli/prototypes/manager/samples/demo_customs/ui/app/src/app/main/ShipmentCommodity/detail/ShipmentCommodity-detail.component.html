<div class="container">
<o-form-container breadcrumb="yes" breadcrumb-label-columns="local_shipment_oid_nbr" breadcrumb-separator=", " class="fill-form">
      <o-form #form attr="ShipmentCommodity_form_edit" 
        service="ShipmentCommodity" 
        entity="ShipmentCommodity" 
        fxLayout="column" 
        show-header="yes" 
        header-actions="R;U;D"
        #oDetailForm keys="local_shipment_oid_nbr;sequence_nbr" 
        keys-sql-types="INTEGER;INTEGER" 
        show-header-navigation="yes"
        (onDataLoaded)="onDataLoaded($event)">

  <o-row attr="row1" layout-align="start stretch">
    <div fxLayout="row wrap" fxLayoutAlign="start start" fxFlex fxLayoutGap="14px">
      
      <o-list-picker 
        attr="local_shipment_oid_nbr"
        service="Shipment" 
        entity="ShipmentType"
        fxFlex="30" 
        query-on-init="no" 
        query-on-bind="yes" 
        required="no" 
        enabled="yes" 
        filter="yes"
        value-column="local_shipment_oid_nbr" 
        value-column-type="INTEGER"  
        keys="local_shipment_oid_nbr" 
        columns="local_shipment_oid_nbr;local_shipment_oid_nbr;local_shipment_oid_nbr" 
        title="local_shipment_oid_nbr"
        visible-columns="local_shipment_oid_nbr;local_shipment_oid_nbr" 
        separator=" - " width="680px" class="form-field">
</o-list-picker>
      
      <o-integer-input #sequence_nbr attr="sequence_nbr" label="sequence_nbr" type="integer" editable="no" required="no" ></o-integer-input>
      
      <o-text-input #commodity_desc attr="commodity_desc" label="commodity_desc" enabled="yes" required="no" fxFlex="20%" class="form-field"></o-text-input>
      
      <o-real-input #commodity_wgt attr="commodity_wgt" label="commodity_wgt" min-decimal-digits="2" max-decimal-digits="4" min="0" max="1000000000" fxFlex="20%" class="form-field"></o-real-input>
      
      <o-currency-input #customs_value_amt attr="customs_value_amt" title="customs_value_amt" type="currency" editable="no" required="no" currency-symbol="$" currency-symbol-position="left" thousand-separator="," decimal-separator="."></o-currency-input>
      
      <o-text-input #export_cargo_control_nbr attr="export_cargo_control_nbr" label="export_cargo_control_nbr" enabled="yes" required="no" fxFlex="20%" class="form-field"></o-text-input>
      
      <o-date-input #export_license_expr_dt attr="export_license_expr_dt" value-type="string" label="export_license_expr_dt" enabled="yes" required="no" format="YYYY-MM-DD" fxFlex="20%" class="form-field"></o-date-input>
      
      <o-text-input #export_license_nbr attr="export_license_nbr" label="export_license_nbr" enabled="yes" required="no" fxFlex="20%" class="form-field"></o-text-input>
      
      <o-text-input #harmonized_tariff_nbr attr="harmonized_tariff_nbr" label="harmonized_tariff_nbr" enabled="yes" required="no" fxFlex="20%" class="form-field"></o-text-input>
      
      <o-text-input #last_modified_nm attr="last_modified_nm" label="last_modified_nm" enabled="yes" required="no" fxFlex="20%" class="form-field"></o-text-input>
      
      <o-date-input #last_modified_tmstp attr="last_modified_tmstp" value-type="string" label="last_modified_tmstp" editable="no" required="no" format="YYYY-MM-DD hh:mm:ss" fxFlex="20%" class="form-field"></o-date-input>
      
      <o-text-input #oversize_flg attr="oversize_flg" label="oversize_flg" enabled="yes" required="no" fxFlex="20%" class="form-field"></o-text-input>
      
      <o-integer-input #piece_qty attr="piece_qty" label="piece_qty" type="integer" editable="no" required="no" ></o-integer-input>
      
      <o-integer-input #package_qty attr="package_qty" label="package_qty" type="integer" editable="no" required="no" ></o-integer-input>
      
      <o-date-input #etl_tmstp attr="etl_tmstp" value-type="string" label="etl_tmstp" editable="no" required="no" format="YYYY-MM-DD hh:mm:ss" fxFlex="20%" class="form-field"></o-date-input>
      
      <o-text-input #classification_status_desc attr="classification_status_desc" label="classification_status_desc" enabled="yes" required="no" fxFlex="20%" class="form-field"></o-text-input>
      
      <o-date-input #part_expiration_dt attr="part_expiration_dt" value-type="string" label="part_expiration_dt" enabled="yes" required="no" format="YYYY-MM-DD" fxFlex="20%" class="form-field"></o-date-input>
      
      <o-text-input #clearance_country_cd attr="clearance_country_cd" label="clearance_country_cd" enabled="yes" required="no" fxFlex="20%" class="form-field"></o-text-input>
      
      <o-text-input #commodity_wgt_uom_cd attr="commodity_wgt_uom_cd" label="commodity_wgt_uom_cd" enabled="yes" required="no" fxFlex="20%" class="form-field"></o-text-input>
      
      <o-text-input #hazardous_material_cd attr="hazardous_material_cd" label="hazardous_material_cd" enabled="yes" required="no" fxFlex="20%" class="form-field"></o-text-input>
      
      <o-text-input #origin_country_cd attr="origin_country_cd" label="origin_country_cd" enabled="yes" required="no" fxFlex="20%" class="form-field"></o-text-input>
      
      <o-text-input #tariff_source_cd attr="tariff_source_cd" label="tariff_source_cd" enabled="yes" required="no" fxFlex="20%" class="form-field"></o-text-input>
      
      <o-integer-input #shipment_type_cd attr="shipment_type_cd" label="shipment_type_cd" type="integer" editable="no" required="no" ></o-integer-input>
      
      <o-text-input #commodity_currency_cd attr="commodity_currency_cd" label="commodity_currency_cd" enabled="yes" required="no" fxFlex="20%" class="form-field"></o-text-input>
      
      <o-text-input #unit_of_measure_cd attr="unit_of_measure_cd" label="unit_of_measure_cd" enabled="yes" required="no" fxFlex="20%" class="form-field"></o-text-input>
      
      <o-text-input #classification_status_cd attr="classification_status_cd" label="classification_status_cd" enabled="yes" required="no" fxFlex="20%" class="form-field"></o-text-input>
      
    </div>
  </o-row>
      
      <mat-tab-group fxFill>
        
      </mat-tab-group>
      
    </o-form>
  </o-form-container>
</div>
