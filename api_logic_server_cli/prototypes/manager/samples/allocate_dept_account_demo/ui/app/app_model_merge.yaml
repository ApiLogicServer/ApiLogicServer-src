about:
  date: March 12, 2026 19:47:33
  recent_changes: works with modified safrs-react-admin
  version: 0.0.0
api_root: '{http_type}://{swagger_host}:{port}/{api}'
application:
  app:
    description: generated Ontimize application
    menu_group:
      data:
        icon: edit_square
        menu_item:
          SysConfig:
            icon: edit_square
            menu_name: SysConfig
            menu_title: SysConfig
            page:
              detail:
                columns: name,discount_rate,tax_rate,notes,id
                include_children: true
                page_name: detail
                template_name: detail_template.html
                title: SysConfig
                typescript_name: detail_component.jinja
                visible_columns: name,discount_rate,tax_rate,notes,id
              home:
                columns: name,discount_rate,tax_rate,notes,id
                include_children: true
                page_name: home
                template_name: home_template.html
                title: SysConfig
                typescript_name: home_template.jinja
                visible_columns: name,discount_rate,tax_rate,notes,id
              new:
                columns: name,discount_rate,tax_rate,notes,id
                include_children: true
                page_name: new
                template_name: new_template.html
                title: SysConfig
                typescript_name: new_component.jinja
                visible_columns: name,discount_rate,tax_rate,notes,id
            template_name: module.jinja
        menu_name: data
        menu_title: data
        opened: true
    name: app
authentication: '{system-default}'
entities:
  SysConfig:
    columns:
    - default: '''system'''
      label: ' name*'
      name: name
      required: true
      search: true
      sort: true
      template: text
      type: TEXT
    - default: '0.05'
      name: discount_rate
      template: real
      type: FLOAT
    - default: '0.10'
      name: tax_rate
      template: real
      type: FLOAT
    - name: notes
      template: text
      type: TEXT
    - name: id
      template: integer
      type: INTEGER
    favorite: name
    hidden: {}
    label: SysConfig
    primary_key:
    - id
    type: SysConfig
settings:
  HomeJS: /admin-app/home.js
  max_list_columns: 8
  style_guide:
    api_endpoint: http://localhost:5656/api
    applicationLocales:
    - en
    - es
    currency_symbol: $
    currency_symbol_position: left
    date_format: YYYY-MM-DD
    decimal_max: '1000000000'
    decimal_min: '0'
    decimal_separator: .
    edit_on_mode: dblclick
    exclude_listpicker: false
    include_translation: false
    keycloak_client_id: alsclient
    keycloak_realm: kcals
    keycloak_url: http://localhost:8080
    locale: en
    max_decimal_digits: '4'
    min_decimal_digits: '2'
    mode: tab
    pick_style: list
    serviceType: JSONAPI
    startSessionPath: /auth/login
    style: light
    thousand_separator: ','
    use_keycloak: false
